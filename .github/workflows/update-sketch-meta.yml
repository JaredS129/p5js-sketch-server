name: Update sketch metadata

# Refreshes dateUpdated / lastUpdatedBy for sketches whose code changed in a PR,
# then commits the updated meta.json files back to the PR branch. (FR-022, FR-025)

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  update-sketch-meta:
    runs-on: ubuntu-latest
    # On push, always run. On PRs, skip forks: they cannot push back to the source branch.
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v4
        with:
          # On PRs, check out the head branch; on push, the pushed ref (refs/heads/main).
          ref: ${{ github.event.pull_request.head.ref || github.ref }}
          fetch-depth: 0 # full history so commit-range attribution works

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Refresh metadata
        env:
          GITHUB_BASE_REF: ${{ github.event.pull_request.base.ref }}
          # On push, diff against the tip before the push (empty on PRs / branch creation).
          BASE_REF: ${{ github.event.before }}
        run: npm run update-sketch-meta

      - name: Commit changes
        run: |
          if [ -n "$(git status --porcelain sketches)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add sketches/**/meta.json
            git commit -m "chore: refresh sketch metadata [skip ci]"
            git push
          else
            echo "No metadata changes to commit."
          fi
